<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover, shrink-to-fit=yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="mobile-web-app-capable" content="yes">
  <title>玉界机 · 桌面框架</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      touch-action: pan-x;
      background: #FFFFFF;
      font-family: -apple-system, 'SF Pro Text', 'Helvetica Neue', system-ui, sans-serif;
      -webkit-tap-highlight-color: transparent;
      user-select: none;
      -webkit-user-select: none;
    }

    #app-root {
      width: 100vw;
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      position: relative;
      background: #FFFFFF;
    }

    .desktop-stage {
      flex: 1;
      width: 100%;
      position: relative;
      overflow: hidden;
      touch-action: pan-x;
      padding-bottom: 8px;
    }

    .pages-viewport {
      display: flex;
      height: 100%;
      width: 100%;
      overflow-x: auto;
      overflow-y: hidden;
      scroll-snap-type: x mandatory;
      scroll-behavior: smooth;
      -webkit-overflow-scrolling: touch;
      scrollbar-width: none;
      -ms-overflow-style: none;
    }
    .pages-viewport::-webkit-scrollbar {
      display: none;
    }

    .desktop-page {
      flex: 0 0 100%;
      width: 100%;
      height: 100%;
      scroll-snap-align: start;
      position: relative;
      display: grid;
      grid-template-columns: repeat(6, 1fr);
      grid-template-rows: repeat(4, 1fr);
      gap: 0;
      padding: 14px 12px;
    }

    .desktop-item {
      position: relative;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      border-radius: 20px;
      background: rgba(0, 0, 0, 0.04);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      box-shadow: 0 1px 4px rgba(0,0,0,0.04);
      color: #1d1d1f;
      font-size: 11px;
      font-weight: 500;
      overflow: hidden;
      transition: transform 0.18s ease;
    }

    /* ── 页面指示器 ── */
    .page-indicator {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 7px;
      padding: 6px 0 10px;
      height: 22px;
      background: transparent;
      margin-bottom: 4px;
    }

    .indicator-dot {
      width: 6px;
      height: 6px;
      border-radius: 3px;
      background: rgba(0, 0, 0, 0.2);
      transition: all 0.3s cubic-bezier(0.25, 0.1, 0.25, 1);
    }

    .indicator-dot.active {
      width: 16px;
      background: rgba(0, 0, 0, 0.55);
      border-radius: 3px;
    }

    /* ── 翻页微效 ── */
    .desktop-page {
      transition: opacity 0.28s ease, transform 0.28s ease;
    }
    .desktop-page.inactive-page {
      opacity: 0.75;
      transform: scale(0.985);
    }

    /* ══════════════════════════════════════
       Dock · 悬浮胶囊 · 高透磨砂玻璃
       ══════════════════════════════════════ */
    .dock-wrapper {
      display: flex;
      justify-content: center;
      align-items: flex-end;
      width: 100%;
      padding: 0 20px 20px; /* 底部安全间距 */
      background: transparent;
      pointer-events: none; /* 让点击穿透到Dock内部 */
    }

    .dock-capsule {
      pointer-events: auto;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      padding: 10px 22px;
      border-radius: 40px; /* 完全圆润胶囊 */
      background: rgba(255, 255, 255, 0.72);
      /* 核心：高透磨砂玻璃 */
      backdrop-filter: blur(22px) saturate(180%);
      -webkit-backdrop-filter: blur(22px) saturate(180%);
      /* 极细腻的光泽与边缘 */
      box-shadow:
        0 2px 12px rgba(0, 0, 0, 0.04),
        0 0.5px 0 0 rgba(255, 255, 255, 0.6) inset,
        0 0 0 0.5px rgba(0, 0, 0, 0.06);
      transition: all 0.25s cubic-bezier(0.25, 0.1, 0.25, 1);
      max-width: 340px;
      width: fit-content;
      margin: 0 auto;
    }

    .dock-slot {
      width: 48px;
      height: 48px;
      border-radius: 14px;
      background: rgba(0, 0, 0, 0.03);
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.22s cubic-bezier(0.25, 0.1, 0.25, 1);
      color: #1d1d1f;
      font-size: 24px;
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      box-shadow: 0 0.5px 1px rgba(0,0,0,0.04);
      position: relative;
    }

    /* 占位图标圆角方形风格 */
    .dock-slot-icon {
      width: 32px;
      height: 32px;
      border-radius: 8px;
      background: rgba(0, 0, 0, 0.08);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      color: #1d1d1f;
    }
  </style>
</head>
<body>
  <div id="app-root">
    <!-- 桌面舞台 -->
    <div class="desktop-stage" id="desktopStage">
      <div class="pages-viewport" id="pagesViewport"></div>
    </div>

    <!-- 页面指示器 -->
    <div class="page-indicator" id="pageIndicator"></div>

    <!-- Dock 悬浮容器 -->
    <div class="dock-wrapper">
      <div class="dock-capsule" id="dockCapsule"></div>
    </div>
  </div>

  <script type="module">
    // ══════════════════════════════════════
    // 玉界机 · 桌面底层框架 (纯白通透版)
    // ══════════════════════════════════════

    const desktopItems = new Map();

    const pageState = {
      count: 3,
      currentPage: 0,
    };

    const dockState = {
      items: [],
      maxSlots: 4,
    };

    // ── 元素管理器 ──
    const ElementManager = {
      addItem(item) {
        if (!item.id || !item.type) return;
        desktopItems.set(item.id, { ...item });
        this.renderAllPages();
      },
      removeItem(id) {
        desktopItems.delete(id);
        this.renderAllPages();
      },
      getItemsByPage(idx) {
        return Array.from(desktopItems.values()).filter(i => i.pageIndex === idx);
      },
      getGridStyle(item) {
        return {
          gridColumn: `${item.gridX + 1} / ${item.gridX + 1 + item.width}`,
          gridRow: `${item.gridY + 1} / ${item.gridY + 1 + item.height}`,
        };
      },
      renderAllPages() {
        PageManager.renderPages();
      }
    };

    // ── 网格系统 ──
    const GridSystem = {
      columns: 6,
      rows: 4,
      isValid(gx, gy, w, h) {
        return gx>=0 && gy>=0 && gx+w<=this.columns && gy+h<=this.rows;
      }
    };

    // ── Dock 系统 (悬浮胶囊) ──
    const DockSystem = {
      render() {
        const capsule = document.getElementById('dockCapsule');
        if (!capsule) return;
        capsule.innerHTML = '';
        for (let i = 0; i < this.maxSlots; i++) {
          const slot = document.createElement('div');
          slot.className = 'dock-slot';
          const itemId = dockState.items[i] || null;
          if (itemId && desktopItems.has(itemId)) {
            const item = desktopItems.get(itemId);
            slot.innerHTML = `<div class="dock-slot-icon">${item.name?.charAt(0) || '●'}</div>`;
          } else {
            slot.innerHTML = `<div class="dock-slot-icon" style="background:transparent; color:#b0b0b0;">○</div>`;
          }
          capsule.appendChild(slot);
        }
      },
      get maxSlots() { return dockState.maxSlots; },
      addToDock(id) {
        if (dockState.items.length >= this.maxSlots) return false;
        if (!dockState.items.includes(id)) {
          dockState.items.push(id);
          this.render();
          return true;
        }
        return false;
      },
      removeFromDock(id) {
        const idx = dockState.items.indexOf(id);
        if (idx > -1) {
          dockState.items.splice(idx, 1);
          this.render();
        }
      }
    };

    // ── 页面管理 ──
    const PageManager = {
      viewport: null,
      indicator: null,

      init() {
        this.viewport = document.getElementById('pagesViewport');
        this.indicator = document.getElementById('pageIndicator');
        this.setupScrollListener();
        this.renderPages();
      },

      renderPages() {
        if (!this.viewport) return;
        const scrollLeft = this.viewport.scrollLeft;
        const pw = this.viewport.clientWidth;
        this.viewport.innerHTML = '';
        for (let i = 0; i < pageState.count; i++) {
          const page = document.createElement('div');
          page.className = 'desktop-page';
          page.dataset.pageIndex = i;
          const items = ElementManager.getItemsByPage(i);
          items.forEach(item => {
            const el = document.createElement('div');
            el.className = 'desktop-item';
            const gs = ElementManager.getGridStyle(item);
            el.style.gridColumn = gs.gridColumn;
            el.style.gridRow = gs.gridRow;
            el.innerHTML = `<div style="font-size:28px; margin-bottom:3px; opacity:0.7;">${item.type==='widget'?'▣':'◎'}</div><span style="font-size:11px;">${item.name||''}</span>`;
            page.appendChild(el);
          });
          this.viewport.appendChild(page);
        }
        this.renderIndicator();
        this.applyPageTransitions();
        requestAnimationFrame(() => {
          if (this.viewport && pw>0) {
            this.viewport.scrollLeft = Math.min(scrollLeft, (pageState.count-1)*pw);
            this.updateActivePage();
          }
        });
      },

      renderIndicator() {
        if (!this.indicator) return;
        this.indicator.innerHTML = '';
        for (let i=0;i<pageState.count;i++) {
          const d = document.createElement('span');
          d.className = 'indicator-dot';
          if (i===pageState.currentPage) d.classList.add('active');
          d.addEventListener('click', ()=>this.scrollToPage(i));
          this.indicator.appendChild(d);
        }
      },

      applyPageTransitions() {
        document.querySelectorAll('.desktop-page').forEach((p,idx)=>{
          p.classList.toggle('inactive-page', idx!==pageState.currentPage);
        });
      },

      updateActivePage() {
        if (!this.viewport) return;
        const pw = this.viewport.clientWidth;
        if (pw<=0) return;
        const cur = Math.round(this.viewport.scrollLeft/pw);
        if (cur!==pageState.currentPage) {
          pageState.currentPage = cur;
          this.renderIndicator();
          this.applyPageTransitions();
        }
      },

      setupScrollListener() {
        this.viewport?.addEventListener('scroll', ()=>this.updateActivePage(), {passive:true});
      },

      scrollToPage(i) {
        if (!this.viewport||i<0||i>=pageState.count) return;
        this.viewport.scrollTo({left:i*this.viewport.clientWidth, behavior:'smooth'});
      }
    };

    // 启动
    function bootstrap() {
      DockSystem.render();
      PageManager.init();
      console.log('玉界机·桌面框架 (纯白悬浮Dock)');
    }
    bootstrap();
  </script>
</body>
</html>
