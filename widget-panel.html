<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>玉界机 · 小组件面板</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      width: 100%;
      height: 100vh;
      overflow: hidden;
      background: #e8e8ed;
      font-family: -apple-system, 'SF Pro Text', 'Helvetica Neue', system-ui, sans-serif;
      -webkit-tap-highlight-color: transparent;
      user-select: none;
      -webkit-user-select: none;
      display: flex;
      align-items: flex-end;
      justify-content: center;
    }

    /* ── 遮罩层 ── */
    .overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.15);
      backdrop-filter: blur(4px);
      -webkit-backdrop-filter: blur(4px);
      z-index: 100;
      transition: opacity 0.3s ease;
    }

    /* ── 半屏面板 ── */
    .panel {
      position: fixed;
      bottom: 0;
      left: 50%;
      transform: translateX(-50%);
      width: 100%;
      max-width: 480px;
      height: 55vh;
      background: rgba(255, 255, 255, 0.65);
      backdrop-filter: blur(22px) saturate(180%);
      -webkit-backdrop-filter: blur(22px) saturate(180%);
      border-radius: 28px 28px 0 0;
      box-shadow:
        0 -2px 20px rgba(0, 0, 0, 0.08),
        0 -0.5px 0 0 rgba(255, 255, 255, 0.5) inset;
      z-index: 101;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      transition: transform 0.35s cubic-bezier(0.25, 0.1, 0.25, 1);
    }

    /* ── 拖拽条 ── */
    .drag-handle-container {
      width: 100%;
      height: 24px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: grab;
      flex-shrink: 0;
    }

    .drag-handle {
      width: 36px;
      height: 5px;
      background: rgba(0, 0, 0, 0.2);
      border-radius: 2.5px;
    }

    /* ── 内容区域 ── */
    .panel-content {
      flex: 1;
      overflow-y: auto;
      padding: 0 16px 20px;
      -webkit-overflow-scrolling: touch;
    }

    /* ── 分组样式 ── */
    .widget-group {
      background: rgba(255, 255, 255, 0.4);
      border-radius: 20px;
      margin-bottom: 12px;
      overflow: hidden;
      box-shadow: 0 4px 16px rgba(0, 0, 0, 0.02);
    }

    .widget-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 16px;
      cursor: pointer;
    }

    .widget-header:active {
      background: rgba(0, 0, 0, 0.02);
    }

    .widget-label {
      font-size: 15px;
      font-weight: 500;
      color: #1d1d1f;
    }

    .toggle-icon {
      width: 28px;
      height: 28px;
      border-radius: 8px;
      background: rgba(0, 0, 0, 0.06);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
      color: rgba(0, 0, 0, 0.45);
      flex-shrink: 0;
    }

    .widget-body {
      max-height: 0;
      overflow: hidden;
      transition: max-height 0.35s cubic-bezier(0.25, 0.1, 0.25, 1);
    }

    .widget-body.open {
      max-height: 200px;
    }

    .widget-body-inner {
      margin: 0 12px 12px;
      padding: 14px;
      background: rgba(255, 255, 255, 0.45);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      border-radius: 12px;
      font-size: 14px;
      color: #515154;
    }
  </style>
</head>
<body>

  <div class="overlay" id="overlay"></div>

  <div class="panel" id="widgetPanel">
    <div class="drag-handle-container" id="dragHandle">
      <div class="drag-handle"></div>
    </div>
    <div class="panel-content">
      
      <div class="widget-group">
        <div class="widget-header" data-widget="clock">
          <span class="widget-label">时钟小组件</span>
          <div class="toggle-icon">＋</div>
        </div>
        <div class="widget-body">
          <div class="widget-body-inner">点击上方添加时钟到桌面</div>
        </div>
      </div>

      <div class="widget-group">
        <div class="widget-header" data-widget="weather">
          <span class="widget-label">天气小组件</span>
          <div class="toggle-icon">＋</div>
        </div>
        <div class="widget-body">
          <div class="widget-body-inner">点击上方添加天气到桌面</div>
        </div>
      </div>

    </div>
  </div>

  <script>
    const overlay = document.getElementById('overlay');
    const panel = document.getElementById('widgetPanel');
    const dragHandle = document.getElementById('dragHandle');

    // ── 关闭面板并在主文件里彻底隐藏加号 ──
    function closePanel() {
      panel.style.transform = 'translateX(-50%) translateY(100%)';
      overlay.style.opacity = '0';
      setTimeout(() => {
        overlay.style.display = 'none';
        panel.style.display = 'none';
        
        // 当半屏面板彻底关闭后，确保主页面的加号也被隐藏
        if (window.parent && window.parent.document.getElementById('addButton')) {
          window.parent.document.getElementById('addButton').classList.add('hidden');
        }
      }, 350);
    }

    // 点击遮罩关闭
    overlay.addEventListener('click', closePanel);

    // ── 下滑手势返回 ──
    let isDragging = false;
    let startY = 0;

    dragHandle.addEventListener('touchstart', (e) => {
      isDragging = true;
      startY = e.touches[0].clientY;
      panel.style.transition = 'none';
    });

    dragHandle.addEventListener('touchmove', (e) => {
      if (!isDragging) return;
      const deltaY = e.touches[0].clientY - startY;
      if (deltaY > 0) {
        panel.style.transform = `translateX(-50%) translateY(${deltaY}px)`;
      }
    });

    dragHandle.addEventListener('touchend', (e) => {
      if (!isDragging) return;
      isDragging = false;
      panel.style.transition = 'transform 0.35s cubic-bezier(0.25, 0.1, 0.25, 1)';
      
      const deltaY = e.changedTouches[0].clientY - startY;
      if (deltaY > 80) {
        closePanel(); // 下滑关闭时自动隐藏加号
      } else {
        panel.style.transform = 'translateX(-50%) translateY(0)';
      }
    });

    // ── 折叠/展开 ──
    document.querySelectorAll('.widget-header').forEach(header => {
      header.addEventListener('click', () => {
        const body = header.nextElementSibling;
        body.classList.toggle('open');
      });
    });
  </script>
</body>
</html>
